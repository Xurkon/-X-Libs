<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#8b5cf6" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.15"/>
  <circle cx="700" cy="100" r="60" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <circle cx="700" cy="100" r="80" fill="none" stroke="#6366f1" stroke-width="0.3" opacity="0.15"/>

  <!-- Accent bar left -->
  <rect x="0" y="90" width="8" height="20" fill="url(#accent)" rx="2"/>

  <!-- Library book icon (simplified) -->
  <g transform="translate(70, 60)" opacity="0.9">
    <rect x="0" y="0" width="60" height="80" rx="4" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="10" y1="20" x2="50" y2="20" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="35" x2="45" y2="35" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="50" x2="48" y2="50" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="65" x2="35" y2="65" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Main title -->
  <text x="400" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#textglow)">!X-Libs</text>

  <!-- Subtitle -->
  <text x="400" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle" letter-spacing="4">SHARED LIBRARIES FOR WORLD OF WARCRAFT ADDONS</text>

  <!-- Version badge -->
  <g transform="translate(400, 165)">
    <rect x="-45" y="-12" width="90" height="20" rx="10" fill="#8b5cf6" opacity="0.2"/>
    <rect x="-45" y="-12" width="90" height="20" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">80+ LIBRARIES</text>
  </g>

  <!-- WoW version tags -->
  <g transform="translate(620, 165)">
    <rect x="-30" y="-10" width="60" height="18" rx="3" fill="#22c55e" opacity="0.15"/>
    <text x="0" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">3.3.5a+</text>
  </g>
  <g transform="translate(695, 165)">
    <rect x="-30" y="-10" width="60" height="18" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="0" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Retail</text>
  </g>

  <!-- Bottom glow line -->
  <rect x="150" y="195" width="500" height="2" rx="1" fill="url(#glow)" opacity="0.6"/>
</svg>
